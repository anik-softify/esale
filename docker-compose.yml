services:
  backend:
    build:
      context: ./eSale-api
      dockerfile: eSale.Api/Dockerfile
    container_name: esale-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      Infrastructure__RunDbInitialization: "true"
      Infrastructure__RunHangfireServer: "true"
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: eSale.Api
      Jwt__Audience: eSale.Web
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - esale-net

  frontend:
    build:
      context: ./eSale-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
    container_name: esale-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - esale-net

  mysql:
    image: mysql:8.0
    container_name: esale-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    networks:
      - esale-net

  nginx:
    image: nginx:1.27-alpine
    container_name: esale-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    networks:
      - esale-net

networks:
  esale-net:
    driver: bridge

volumes:
  mysql-data:
